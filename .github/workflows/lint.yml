name: lint

permissions: {} # no need any permissions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  run:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          check-latest: true

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
          args: --timeout 5m
